---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bankapp-allow-ingress
spec:
  podSelector: 
    matchLables:
      app: nginx

  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: 
      - namespaceSelector:
          matchLables: 
            kubernets.io/metadata.name: ingress-nginx
        podSelector:
          matchLables:
            kubernets.io/metadata.name: ingress-nginx
          ports:
            - port: 80
  egress:
    - to:
        - podSelector:
            matchLables:
              app: app-database
            ports:
              - port: 3306
    - to: 
      - namespaceSelector:
          matchLables:
            kubernets.io/metadata.name: kube-system
          ports:
            - port: 53
              protocol: UDP
